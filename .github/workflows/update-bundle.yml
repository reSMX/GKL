name: Update Cenz Bundle

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: write

jobs:
  update-bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build bundle
        run: python extension/scripts/updater/build_bundle.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add extension/data/default-bundle.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: weekly update blocked sites bundle"
          git push
